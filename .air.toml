root = "."
tmp_dir = "tmp"

[build]
  cmd = "templ generate && go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  include_ext = ["go", "templ", "html", "css", "js", "sql"]
  exclude_dir = ["tmp", "bin", "dist", "vendor", ".git", "data", "caddy_data"]
  exclude_regex = ["_test\\.go$", "_templ\\.go$"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = true
