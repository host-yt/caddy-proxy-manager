name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Anti-regression gates for the 2026-07 security/supply-chain hardening.
      - name: Security policy gates
        run: |
          fail=0
          if grep -rEn 'image:[[:space:]]*caddy:2\.8|FROM caddy:2\.8' scripts/ deploy/; then
            echo "::error::stale caddy:2.8 image pin (bump to current stable)"; fail=1; fi
          if grep -rn 'get.docker.com' scripts/; then
            echo "::error::get.docker.com|sh bootstrap in scripts/ (use distro docker.io)"; fail=1; fi
          if grep -rEn 'pull_policy:[[:space:]]*always' deploy/; then
            echo "::error::pull_policy: always in deploy/ (use if_not_present)"; fail=1; fi
          if grep -rEn 'ghcr\.io/host-yt/[^[:space:]}]*:latest' deploy/; then
            echo "::error:::latest tag on own ghcr image in deploy/ (pin a version/digest)"; fail=1; fi
          if grep -En '^[[:space:]]*--with ' deploy/caddy/Dockerfile | grep -v '@'; then
            echo "::error::unpinned xcaddy --with module (missing @version/@commit)"; fail=1; fi
          if git ls-files | grep -En 'install_state|\.db$|^data/'; then
            echo "::error::runtime artifact tracked in git"; fail=1; fi
          if grep -rEn 'templ generate \|\| true|sqlc generate \|\| true' Dockerfile .github/; then
            echo "::error::codegen error swallowed with || true (let build fail)"; fail=1; fi
          exit $fail

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install codegen tools
        run: |
          go install github.com/a-h/templ/cmd/templ@v0.2.793
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.27.0

      - name: Generate
        run: |
          if find internal -name '*.templ' | grep -q .; then templ generate; fi
          if [ -f sqlc.yaml ] || [ -f sqlc.yml ]; then sqlc generate; fi

      - name: Check doc links
        run: python3 scripts/check_docs_links.py

      - name: Check migrations layout
        run: make check-migrations

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  # golangci-lint disabled until upstream ships a build linked against
  # Go 1.26. Currently v1.62.2 is the newest tagged release and it's
  # still compiled against Go 1.23 → refuses any go.mod targeting >=1.24.
  # `go vet` in the build job covers the must-pass static checks.

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -f Dockerfile -t hostyt/proxy-gateway:ci .
