# Example docker-compose snippet for adding hpg-node-agent as a
# sidecar on a Caddy node. Drop these two services into the same
# compose file as the existing `caddy` service (or run as a separate
# stack sharing the node's network namespace).
#
# Required (one-time, per node):
#   1. `/admin/nodes/{id}/tunnel/enable` in the panel - produces a
#      one-shot flash with HPG_NODE_TOKEN + HPG_WG_PRIVATE_KEY +
#      HPG_WG_LISTEN_PORT. Copy them into this env section.
#   2. Open UDP <HPG_WG_LISTEN_PORT> on the node's public firewall.

version: "3.9"
services:
  hpg-node-agent:
    image: ghcr.io/host-yt/caddy-proxy-manager-node-agent:1.3.2
    restart: unless-stopped
    network_mode: host                                # needed for wg-tun0 + nftables + UDP listen
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      HPG_PANEL_URL: "https://proxy.example.com"
      HPG_NODE_TOKEN: "${HPG_NODE_TOKEN}"             # from panel flash, one-shot
      HPG_WG_PRIVATE_KEY: "${HPG_WG_PRIVATE_KEY}"     # from panel flash, one-shot
      HPG_WG_GATEWAY_IP: "100.96.0.1/16"              # this node's tunnel gateway + subnet
      HPG_WG_LISTEN_PORT: "51821"                     # default; match panel's tunnel_listen_port
      HPG_WG_INTERFACE: "wg-tun0"                     # default
      HPG_POLL_INTERVAL: "30s"                        # default
      # Optional: hard-fail if nftables rule install fails (paranoid mode).
      HPG_REQUIRE_NFTABLES: "0"
      HPG_TUNNEL_TRANSPORT: "udp"             # udp|wss|auto — wss/auto starts wstunnel
      HPG_WSTUNNEL_PORT: ""                    # loopback port for wstunnel server (e.g. 51823)
      # Access-log forwarding: tail Caddy's access log and POST to the panel's
      # authenticated /internal/access-log. Requires the same host path mounted
      # into the caddy service at /var/log/caddy (see remote-node compose).
      HPG_CADDY_ACCESS_LOG: "/var/log/caddy/access.log"
      # WAF event forwarding: tail Coraza's NDJSON audit log and POST to the
      # panel's /api/node/waf/events. The panel emits SecAuditLog to this path
      # when WAF is enabled on a route.
      HPG_CADDY_WAF_AUDIT_LOG: "/var/log/caddy/waf-audit.log"
      # Forwarders persist their read position (<log>.hpgpos) into this writable
      # dir so a restart resumes instead of replaying. REQUIRED when the log
      # volume below is read-only (the default) - otherwise every restart
      # re-ships the whole log and cleared WAF events reappear in the panel.
      HPG_AGENT_STATE_DIR: "/var/lib/hpg-node-agent"
      # On first run (no position file) the existing backlog is forwarded once.
      # Set HPG_FORWARD_TAIL_ONLY=1 to skip any pre-existing backlog and only
      # forward new lines from startup.
      # HPG_FORWARD_TAIL_ONLY: "1"
    volumes:
      # Shared with caddy: agent reads the rolling access log Caddy writes.
      - /opt/hostyt-node/caddy-logs:/var/log/caddy:ro
      # Writable state: keeps forward offsets across restarts.
      - /opt/hostyt-node/agent-state:/var/lib/hpg-node-agent
    # Healthcheck: agent prints reconcile JSON every poll; if no log
    # for 90s, container is wedged. Pair with restart policy above.
    healthcheck:
      test: ["CMD", "pgrep", "hpg-node-agent"]
      interval: 30s
      timeout: 5s
      retries: 3
