# =========================================================================
# Hostyt Proxy Gateway - production-ready compose stack
# Tested with Docker Compose v2.20+. Works in Portainer Stacks.
#
# This IS the supported "colocated" topology: caddy owns 80/443/443-udp,
# app is loopback-only, and the install wizard registers caddy as node-1
# and self-bootstraps the panel's own route onto it. It already carries
# customer traffic like any other node - see docs/MULTI_NODE.md
# "Colocated panel + edge". Do not run deploy/remote-node/ on this same
# host: it binds the same ports and will fail to start.
# =========================================================================

services:
  # One-shot: the GeoIP mmdb lives on a volume shared by app (writer, UID 65532
  # non-root) and caddy (reader, root). Whichever container mounts it first owns
  # the dir as root, so the non-root app gets EACCES on write. Chown the volume
  # to the app UID before either starts so a fresh install just works.
  geoip-init:
    image: busybox:1.36
    command: ["sh", "-c", "mkdir -p /data/geoip && chown -R 65532:65532 /data/geoip"]
    volumes:
      - geoip_data:/data/geoip
    restart: "no"
    # Must be explicit: without it compose spawns an implicit `default` network
    # whose auto-IPAM grabs 172.18.0.0/16 - the subnet `internal` pins below -
    # and whichever loses the race dies with "Pool overlaps with other one".
    networks:
      - internal

  app:
    image: ${IMAGE_APP:-ghcr.io/host-yt/caddy-proxy-manager:1.4.0}
    pull_policy: ${IMAGE_PULL_POLICY:-if_not_present}
    restart: unless-stopped
    # App runs as distroless nonroot; block any setuid privilege escalation.
    security_opt:
      - no-new-privileges:true
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL}
      APP_BIND: ${APP_BIND:-0.0.0.0:8080}
      APP_SECRET: ${APP_SECRET:?APP_SECRET must be set (openssl rand -hex 32)}
      # Must match the `internal` network subnet below so TrustedRealIP
      # accepts X-Forwarded-For from the bundled Caddy container instead of
      # collapsing every client to Caddy's IP (breaks per-IP rate-limit).
      APP_TRUSTED_PROXIES: ${APP_TRUSTED_PROXIES:-172.18.0.0/16}
      INSTALL_TOKEN: ${INSTALL_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:?DB_NAME must be set}
      DB_USER: ${DB_USER:?DB_USER must be set}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
      CADDY_ADMIN_URL: ${CADDY_ADMIN_URL:-http://caddy:2019}
      APP_INTERNAL_URL: ${APP_INTERNAL_URL:-http://app:8080}
      ACCESS_LOG_URL: ${ACCESS_LOG_URL:-http://app:8080/internal/access-log}
      # Default OFF: stock caddy rejects the cache config and the WHOLE node
      # goes offline. Flip to 1 ONLY after every Caddy node (central + remote)
      # runs the custom image (deploy/caddy/Dockerfile, xcaddy + cache-handler).
      CACHE_HANDLER_AVAILABLE: ${CACHE_HANDLER_AVAILABLE:-0}
      # Same gating for the caddy-l4 module (TCP/UDP stream proxy at
      # /admin/streams). Stock Caddy rejects apps.layer4. Default on for
      # this compose because the bundled Caddy image already includes
      # caddy-l4 via xcaddy (deploy/caddy/Dockerfile).
      LAYER4_AVAILABLE: ${LAYER4_AVAILABLE:-1}
      # The bundled edge image also carries coraza (WAF), maxmind (geo),
      # rate_limit and weighted LB, so default these on too. Without passing
      # them the app never sees the flag an admin sets in .env, and per-route
      # WAF/geo/rate-limit silently no-op until the node module probe happens
      # to flip the per-node capability instead.
      WAF_MODULE_AVAILABLE: ${WAF_MODULE_AVAILABLE:-1}
      GEOIP_AVAILABLE: ${GEOIP_AVAILABLE:-1}
      RATE_LIMIT_AVAILABLE: ${RATE_LIMIT_AVAILABLE:-1}
      WEIGHTED_LB_AVAILABLE: ${WEIGHTED_LB_AVAILABLE:-1}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      geoip-init:
        condition: service_completed_successfully
    ports:
      # Loopback-only: Caddy is the public entry point (bootstraps HTTPS via
      # wizard). Exposing this on 0.0.0.0 lets anyone hit the panel in
      # cleartext, bypassing edge WAF/rate-limit. Widen only if you know why.
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_PORT:-8080}:8080"
    volumes:
      - app_data:/app/data
      - wg_config:/app/wg
      # Shared with caddy: app downloads the MaxMind mmdb here, caddy reads it.
      - geoip_data:/data/geoip
    networks:
      - internal

  # Bundled MariaDB - comment out if using external managed DB.
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD must be set}
      MARIADB_DATABASE: ${DB_NAME:?DB_NAME must be set}
      MARIADB_USER: ${DB_USER:?DB_USER must be set}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # No ":-" empty default - empty --requirepass disables auth entirely.
    # Redis holds sessions, rate-limit, 2FA/OTP; must always be authenticated.
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  caddy:
    # Custom Caddy with xcaddy-bundled cache-handler (Souin) so the panel
    # can flip CACHE_HANDLER_AVAILABLE=1 and per-route cache_enabled does
    # real origin caching. CI pushes deploy/caddy/Dockerfile to ghcr; local
    # dev falls back to `build:` when the image isn't pullable.
    image: ${IMAGE_CADDY:-ghcr.io/host-yt/caddy-proxy-manager-edge:1.4.0}
    build:
      context: ./caddy
      dockerfile: Dockerfile
    pull_policy: ${IMAGE_PULL_POLICY:-if_not_present}
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"        # HTTP/3
    depends_on:
      geoip-init:
        condition: service_completed_successfully
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      # Access logs (when ACCESS_LOG_URL is enabled). Caddy writes a rolling
      # JSON file here; a node-agent with HPG_CADDY_ACCESS_LOG tails + forwards.
      - caddy_logs:/var/log/caddy
      # GeoIP mmdb the app downloads; caddy's maxmind_geolocation matcher reads it.
      - geoip_data:/data/geoip
      # Caddyfile is baked into the image (deploy/caddy/Dockerfile).
      # Uncomment + supply your own to override:
      # - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      ASK_ENDPOINT_URL: http://app:8080/internal/ask
      ACME_EMAIL: ${CADDY_ACME_EMAIL}
    networks:
      - internal
    extra_hosts:
      # WSS tunnel: reach host-net wstunnel via own bridge gateway, not docker0
      # (host-gateway points at 172.17.0.1 which a user bridge can't route to).
      - "host.docker.internal:172.18.0.1"

  # Node-agent for the CENTRAL host: tails Caddy's access log and forwards
  # it to the panel (so the access-log dashboard fills in), and runs the
  # customer-tunnel WireGuard (wg-tun0). Without this service the access-log
  # file is written but nobody ships it - dashboard stays empty.
  # Needs a one-shot node token + WG key from the panel tunnel-enable flash.
  hpg-node-agent:
    image: ${IMAGE_NODE_AGENT:-ghcr.io/host-yt/caddy-proxy-manager-node-agent:1.4.0}
    pull_policy: ${IMAGE_PULL_POLICY:-if_not_present}
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      HPG_PANEL_URL: ${APP_URL}
      HPG_NODE_TOKEN: ${HPG_NODE_TOKEN}
      HPG_WG_PRIVATE_KEY: ${HPG_WG_PRIVATE_KEY}
      HPG_WG_GATEWAY_IP: ${HPG_WG_GATEWAY_IP:-100.96.0.1/16}
      HPG_WG_LISTEN_PORT: ${HPG_WG_LISTEN_PORT:-51821}
      HPG_WG_INTERFACE: ${HPG_WG_INTERFACE:-wg-tun0}
      HPG_POLL_INTERVAL: ${HPG_POLL_INTERVAL:-30s}
      HPG_TUNNEL_TRANSPORT: ${HPG_TUNNEL_TRANSPORT:-auto}
      HPG_WSTUNNEL_PORT: ${HPG_WSTUNNEL_PORT:-51823}
      HPG_CADDY_ACCESS_LOG: /var/log/caddy/access.log
      HPG_CADDY_WAF_AUDIT_LOG: /var/log/caddy/waf-audit.log
      # Writable dir for the forwarders' read-offset sidecars. The log volume is
      # mounted read-only, so without this every restart replays the whole log
      # and resurrects cleared WAF events.
      HPG_AGENT_STATE_DIR: /var/lib/hpg-node-agent
    volumes:
      # Same named volume caddy writes to; agent reads it (:ro).
      - caddy_logs:/var/log/caddy:ro
      # Persists forward offsets across restarts (must be writable).
      - node_agent_state:/var/lib/hpg-node-agent
    healthcheck:
      test: ["CMD", "pgrep", "hpg-node-agent"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      # Skipped by default (needs node token); enable with:
      # `docker compose --profile node up -d` after the panel tunnel flash.
      - node

  # WireGuard sidecar - brings up wg0 on the manager host from the
  # config file the app writes into the shared volume. Auto-applies
  # changes (peer add/remove) via `wg syncconf` every 10 s.
  #
  # Requires host network namespace + NET_ADMIN. On macOS Docker Desktop
  # the kernel module path may not exist; this service is intended for
  # the Linux VPS where the manager actually runs in production.
  wireguard:
    image: ${IMAGE_WG:-ghcr.io/host-yt/caddy-proxy-manager-wg:1.4.0}
    pull_policy: ${IMAGE_PULL_POLICY:-if_not_present}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    network_mode: host
    volumes:
      - wg_config:/config
      - /lib/modules:/lib/modules:ro
    profiles:
      # Skipped by default; enable with: `docker compose --profile mesh up -d`
      # so single-host local dev doesn't try to claim host networking.
      - mesh

volumes:
  app_data:
  mariadb_data:
  redis_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  node_agent_state:
  wg_config:
  geoip_data:

networks:
  internal:
    driver: bridge
    # Pin subnet so host.docker.internal (caddy) resolves to a deterministic,
    # routable gateway. Must match the IP in caddy.extra_hosts above.
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
